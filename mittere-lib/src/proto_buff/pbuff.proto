message ConnectionError {
  string err = 1;
}

message Login {
  string username = 1;
  string password = 2;
}

message LoginValidate {
  bool validated = 1;
}

message JoinChannel { // sent when a user first logs in and when switching channels
  string channel_list = 1;
  string channel_msg_history = 2;
}

message SignupKey {
  string key = 1;
}

message SignupKeyValidate {
  bool validated = 1;
}

message Signup {
  string username = 1;
  string password = 2;
}

message Disconnect {
  bool error = 1; // set to true if disconnecting because of an error
}

message Msg { // when a client sends a message, this data is sent
  string display_name = 1;
  string name_color = 2;
  string msg = 3;
  string msg_color = 4;
}

message MOTD { // sent when the user first connects
  string motd = 1;
}